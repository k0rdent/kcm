apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: K0sControlPlane
metadata:
  name: {{ include "k0scontrolplane.name" . }}
spec:
  replicas: {{ .Values.controlPlaneNumber }}
  version: {{ .Values.k0s.version }}
  {{- if .Values.singleArtifactSource.enabled }}
  downloadURL: "{{ .Values.singleArtifactSource.k0sURL }}/k0s-{{ .Values.k0s.version }}-amd64"
  {{- end }}
  k0sConfigSpec:
    args:
      - --enable-worker
      - --enable-cloud-provider
      - --kubelet-extra-args="--cloud-provider=external"
      - --disable-components=konnectivity-server
    files:
      {{- if .Values.k0s.auth.enabled }}
      - content: |
          {{- with .Values.k0s.auth.config }}
          {{- toYaml . | nindent 14 }}
          {{- end }}
        permissions: "0644"
        path: /etc/k0s/auth/auth-config.yaml
      {{- end }}
    k0s:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: k0s
      spec:
        api:
          extraArgs:
            anonymous-auth: "true"
            {{- if .Values.k0s.auth.enabled }}
            authentication-config: "/etc/k0s/auth/auth-config.yaml"
            {{- end }}
          {{- with .Values.k0s.api.extraArgs }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        network:
          provider: calico
          calico:
            mode: ipip
        {{- if .Values.singleArtifactSource.enabled }}
        images:
          metricsserver:
            image: "{{ .Values.singleArtifactSource.registry}}/metrics-server"
          kubeproxy:
            image: "{{ .Values.singleArtifactSource.registry}}/kube-proxy"
          coredns:
            image: "{{ .Values.singleArtifactSource.registry}}/coredns"
          pause:
            image: "{{ .Values.singleArtifactSource.registry}}/pause"
          calico:
            cni:
              image: "{{ .Values.singleArtifactSource.registry}}/calico-cni"
            node:
              image: "{{ .Values.singleArtifactSource.registry}}/calico-node"
            kubecontrollers:
              image: "{{ .Values.singleArtifactSource.registry}}/calico-kube-controllers"
        {{- end }}
        extensions:
          helm:
            {{- if not .Values.singleArtifactSource.enabled }}
            repositories:
              - name: mirantis
                url: https://charts.mirantis.com
              - name: aws-ebs-csi-driver
                url: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
            {{- end }}
            charts:
              - name: aws-cloud-controller-manager
                namespace: kube-system
                {{- if .Values.singleArtifactSource.enabled }}
                chartname: oci://{{ .Values.singleArtifactSource.registry}}/aws-cloud-controller-manager
                {{- else }}
                chartname: mirantis/aws-cloud-controller-manager
                {{- end }}
                version: "0.0.9"
                values: |
                  nodeSelector:
                    node-role.kubernetes.io/control-plane: "true"
                  image:
                    {{- if .Values.singleArtifactSource.enabled }}
                    repository: {{ .Values.singleArtifactSource.registry }}
                    {{- end }}
                    tag: v1.30.3
                  args:
                    - --v=2
                    - --cloud-provider=aws
                    - --cluster-cidr={{ first .Values.clusterNetwork.pods.cidrBlocks }}
                    - --allocate-node-cidrs=true
                    - --cluster-name={{ include "cluster.name" . }}
              - name: aws-ebs-csi-driver
                namespace: kube-system
                {{- if .Values.singleArtifactSource.enabled }}
                chartname: oci://{{ .Values.singleArtifactSource.registry}}/aws-ebs-csi-driver
                {{- else }}
                chartname: aws-ebs-csi-driver/aws-ebs-csi-driver
                {{- end }}
                version: 2.33.0
                values: |
                  {{- if .Values.singleArtifactSource.enabled }}
                  image:
                    repository: {{ .Values.singleArtifactSource.registry }}
                  sidecars:
                    provisioner:
                      image:
                        repository: {{ .Values.singleArtifactSource.registry }}
                    attacher:
                      image:
                        repository: {{ .Values.singleArtifactSource.registry }}
                    snapshotter:
                      image:
                        repository: {{ .Values.singleArtifactSource.registry }}
                    livenessProbe:
                      image:
                        repository: {{ .Values.singleArtifactSource.registry }}
                    resizer:
                      image:
                        repository: {{ .Values.singleArtifactSource.registry }}
                    nodeDriverRegistrar:
                      image:
                        repository: {{ .Values.singleArtifactSource.registry }}
                    volumemodifier:
                      image:
                        repository: {{ .Values.singleArtifactSource.registry }}
                  {{- end }}
                  defaultStorageClass:
                    enabled: true
                  node:
                    kubeletPath: /var/lib/k0s/kubelet
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: AWSMachineTemplate
      name: {{ include "awsmachinetemplate.controlplane.name" . }}
      namespace: {{ .Release.Namespace }}
